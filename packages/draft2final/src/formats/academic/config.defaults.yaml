list:
  textIndentPerLevel: 16
  markerGap: 5
  itemSpacingAfter: 3.2
  tightItemSpacingAfter: 0.9
  continuationIndentLevels: 0
  unorderedMarkers:
    - "\u2022"
    - "\u25E6"
    - "\u25AA"
  orderedMarkers:
    - decimal
    - lower-alpha
    - lower-roman
    - upper-alpha
  taskMarkers:
    checked: "[x]"
    unchecked: "[ ]"

links:
  mode: citation
  dedupe: true
  citationStyle: bracket

references:
  enabled: true
  heading: References
  numberingStyle: decimal
  includeLinkTitle: true

blockquote:
  attribution:
    enabled: true
    markerPattern: '^[-\u2014\u2013]{1,2}\s+'

title:
  subheading:
    enabled: false
    markerPattern: '^::\s+'
    requireMarker: true
    stripMarker: true
    applyToFirstH1Only: true
    keepWithNext: true

images:
  blockStyle:
    marginTop: 8
    marginBottom: 8
    borderWidth: 0.6
    borderColor: "#6f6f6f"
    borderRadius: 0
  frame:
    mode: "off"
    markerPattern: '\b(frame|framed)\b'
    style: {}

captions:
  pattern: '^(Figure|Fig\.|Table|Plate|Source)\s+([0-9]+|[IVXLC]+)\b'
  blockquoteUnderImageAsFigureCaption: false
  style:
    textAlign: left
    hyphenation: "off"
    fontStyle: normal
    fontSize: 10
    lineHeight: 1.3
    color: "#242424"
    marginTop: 2
    marginBottom: 11

tables:
  zebra: false
  headerColor: "#f3f4f6"

codeBlocks:
  defaultMode: listing
  languageModes:
    text: listing
    pseudocode: listing
    theorem: theorem
    lemma: lemma
    proposition: proposition
    corollary: corollary
    proof: proof
    remark: remark
    example: example
  modes:
    listing:
      style:
        fontFamily: Cousine
        fontSize: 9.6
        lineHeight: 1.28
        backgroundColor: "#ffffff"
        borderWidth: 0
        borderColor: "#9a9a9a"
        borderRadius: 0
        paddingTop: 5
        paddingBottom: 5
        paddingLeft: 7
        paddingRight: 7
        marginTop: 7
        marginBottom: 8
    theorem:
      style:
        fontFamily: Caladea
        fontStyle: italic
        fontSize: 10.8
        lineHeight: 1.44
        textAlign: left
        color: "#1f1f1f"
        backgroundColor: "#ffffff"
        borderWidth: 0
