layout:
    fontFamily: Caladea
    fontSize: 10.8
    lineHeight: 1.5
    pageSize: LETTER
    margins:
        top: 72
        right: 72
        bottom: 72
        left: 72
    hyphenation: auto
    justifyEngine: advanced
    justifyStrategy: auto
    showPageNumbers: true
    pageNumberFormat: '{n}'
    pageNumberPosition: bottom
    pageNumberAlignment: center
    pageNumberOffset: 32
    pageNumberStartPage: 1
    pageNumberFontSize: 9
    pageNumberColor: '#4f4f4f'
    pageNumberFont: Caladea

styles:
    heading-1:
        fontSize: 20
        hyphenation: 'off'
        textAlign: left
    heading-2:
        fontSize: 17
        hyphenation: 'off'
        textAlign: left
    heading-3:
        fontSize: 14.8
        hyphenation: 'off'
        textAlign: left
    code-block:
        fontFamily: Cousine
        fontSize: 9.6
        lineHeight: 1.28
        backgroundColor: '#ffffff'
        borderWidth: 0
        borderColor: '#9a9a9a'
        borderRadius: 0
        paddingTop: 5
        paddingBottom: 5
        paddingLeft: 7
        paddingRight: 7
        marginTop: 7
        marginBottom: 8
    inline-code:
        fontFamily: Cousine
        fontSize: 9.6
        backgroundColor: '#ffffff'
    blockquote:
        textAlign: left
        fontStyle: normal
        fontSize: 10.6
        lineHeight: 1.45
        color: '#202020'
        paddingLeft: 18
        paddingRight: 18
        borderLeftWidth: 0
        marginTop: 8
        marginBottom: 9
    blockquote-attribution:
        textAlign: right
        fontStyle: italic
        fontSize: 10.2
        color: '#3f3f3f'
        marginTop: 2
        marginBottom: 7
    references-heading:
        hyphenation: 'off'
        textAlign: left
        fontSize: 13.6
        marginTop: 16
        marginBottom: 5.8
    references-item:
        textAlign: left
        hyphenation: 'off'
        fontSize: 10.4
        lineHeight: 1.4
        marginBottom: 3.4
    definition-term:
        fontWeight: 700
        marginTop: 5.5
        marginBottom: 1.2
    definition-desc:
        paddingLeft: 12
        marginTop: 0
        marginBottom: 5.5
    table-cell:
        paddingTop: 4
        paddingBottom: 4
        paddingLeft: 5
        paddingRight: 5
        borderWidth: 0.6
        borderColor: '#111111'
