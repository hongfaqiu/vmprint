typography:
  fontFamily: Caladea
  fontSize: 11.3
  lineHeight: 1.52
  color: "#1b1f24"

layout:
  pageSize: LETTER
  margins:
    top: 76
    right: 80
    bottom: 76
    left: 80
  hyphenation: soft
  justifyEngine: advanced
  justifyStrategy: auto
  showPageNumbers: true
  pageNumberFormat: "{n}"
  pageNumberPosition: bottom
  pageNumberAlignment: center
  pageNumberOffset: 32
  pageNumberStartPage: 1
  pageNumberFontSize: 9
  pageNumberColor: "#6b7280"
  pageNumberFont: Caladea

list:
  textIndentPerLevel: 16.5
  markerGap: 6
  itemSpacingAfter: 3.8
  tightItemSpacingAfter: 1.0
  continuationIndentLevels: 1
  unorderedMarkers:
    - "\u2022"
    - "\u25E6"
    - "\u25AA"
  orderedMarkers:
    - decimal
    - lower-alpha
    - lower-roman
  taskMarkers:
    checked: "\u2611"
    unchecked: "\u2610"

links:
  mode: citation
  dedupe: true
  citationStyle: bracket

references:
  enabled: true
  heading: References
  numberingStyle: decimal
  includeLinkTitle: true

blockquote:
  attribution:
    enabled: true
    markerPattern: '^[-\\u2014\\u2013]{1,2}\\s+'

codeBlocks:
  defaultMode: listing
  languageModes:
    ts: listing
    js: listing
    json: listing
    yaml: listing
    yml: listing
    bash: listing
    sh: listing
    shell: listing
    text: listing
  modes:
    listing:
      style:
        fontFamily: Cousine
        fontSize: 9.8
        lineHeight: 1.34
        color: "#1f2937"
        backgroundColor: "#f4f7fb"
        borderWidth: 0.8
        borderColor: "#cdd7e3"
        borderRadius: 4
        paddingTop: 7
        paddingBottom: 7
        paddingLeft: 10
        paddingRight: 10
        marginTop: 8
        marginBottom: 10

tables:
  zebra: true
  zebraColor: "#f7f9fc"
  headerColor: "#eef3f8"

styles:
  d2f_heading_1:
    fontSize: 25
    lineHeight: 1.2
    color: "#0f3f63"
    marginTop: 24
    marginBottom: 12
    hyphenation: off
    textAlign: left
  d2f_heading_2:
    fontSize: 19.2
    color: "#14527f"
    marginTop: 20
    marginBottom: 8.5
    hyphenation: off
    textAlign: left
  d2f_heading_3:
    fontSize: 15.6
    color: "#1c5e8f"
    marginTop: 17
    marginBottom: 7
    hyphenation: off
    textAlign: left
  d2f_paragraph:
    textAlign: left
    hyphenation: soft
    marginBottom: 9.6
  d2f_inline_code:
    fontFamily: Cousine
    fontSize: 9.9
    color: "#18334b"
    backgroundColor: "#ecf2f9"
    borderRadius: 2
  d2f_code_block:
    fontFamily: Cousine
    fontSize: 9.8
    lineHeight: 1.34
    color: "#1f2937"
    backgroundColor: "#f4f7fb"
    borderWidth: 0.8
    borderColor: "#cdd7e3"
    borderRadius: 4
    paddingTop: 7
    paddingBottom: 7
    paddingLeft: 10
    paddingRight: 10
    marginTop: 9
    marginBottom: 11
  d2f_blockquote:
    textAlign: left
    hyphenation: soft
    color: "#1f3448"
    paddingLeft: 15
    paddingRight: 8
    borderLeftWidth: 1.6
    borderLeftColor: "#628bb0"
    backgroundColor: "#f7fafd"
    marginTop: 9
    marginBottom: 11
  d2f_blockquote_attribution:
    textAlign: right
    fontStyle: normal
    color: "#4b5563"
    marginTop: 2
    marginBottom: 8
  d2f_thematic_break:
    borderTopWidth: 0.8
    borderTopColor: "#5a7c9e"
    marginTop: 16
    marginBottom: 16
  d2f_citation_marker:
    fontSize: 8.4
    color: "#334e68"
  d2f_references_heading:
    fontSize: 13.8
    color: "#0f3f63"
    hyphenation: off
    marginTop: 18
    marginBottom: 6
  d2f_references_item:
    textAlign: left
    hyphenation: off
    fontSize: 10.3
    lineHeight: 1.38
    paddingLeft: 12
    textIndent: -12
    marginBottom: 3.4
  d2f_definition_term:
    fontWeight: 700
    color: "#0f3f63"
    marginTop: 6
    marginBottom: 1.4
  d2f_definition_desc:
    paddingLeft: 14
    marginBottom: 6
  table-cell:
    paddingTop: 4
    paddingBottom: 4
    paddingLeft: 5
    paddingRight: 5
    borderWidth: 0.6
    borderColor: "#111111"
