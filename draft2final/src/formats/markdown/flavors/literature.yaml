typography:
  fontFamily: Caladea
  fontSize: 10.6
  lineHeight: 1.52
  color: "#161616"

layout:
  pageSize:
    width: 396
    height: 612
  margins:
    top: 64
    right: 54
    bottom: 62
    left: 54
  hyphenation: soft
  justifyEngine: advanced
  justifyStrategy: auto
  showPageNumbers: true
  pageNumberFormat: "{n}"
  pageNumberPosition: bottom
  pageNumberAlignment: center
  pageNumberOffset: 22
  pageNumberStartPage: 1
  pageNumberFontSize: 9
  pageNumberColor: "#666666"
  pageNumberFont: Caladea

list:
  textIndentPerLevel: 15
  markerGap: 5
  itemSpacingAfter: 3.6
  tightItemSpacingAfter: 1.2
  continuationIndentLevels: 0
  unorderedMarkers:
    - "\u2014"
    - "\u2014"
    - "\u2014"
  orderedMarkers:
    - upper-roman
    - decimal
    - lower-alpha
  taskMarkers:
    checked: "[done]"
    unchecked: "[ ]"

links:
  mode: citation
  dedupe: true
  citationStyle: bracket

references:
  enabled: true
  heading: Notes
  numberingStyle: lower-roman
  includeLinkTitle: true

blockquote:
  attribution:
    enabled: true
    markerPattern: '^[-\u2014\u2013]{1,2}\s+'

images:
  blockStyle:
    width: 286
    marginTop: 14
    marginBottom: 5
    borderWidth: 0
    borderRadius: 0
    paddingTop: 0
    paddingBottom: 0
    paddingLeft: 0
    paddingRight: 0

captions:
  pattern: '^(Plate|Figure|Fig\\.|Source)\\s+([0-9]+|[IVXLC]+)\\b'
  style:
    textAlign: left
    hyphenation: off
    fontStyle: italic
    fontSize: 9.8
    lineHeight: 1.3
    color: "#47443f"
    marginTop: 3
    marginBottom: 9

tables:
  zebra: false
  headerColor: "#f3f4f6"

codeBlocks:
  defaultMode: extract
  languageModes:
    verse: verse
    poetry: verse
    poem: verse
    extract: extract
    archive: extract
    epigraph: epigraph
    letter: letter
    marginalia: marginalia
  modes:
    verse:
      style:
        fontFamily: Caladea
        fontStyle: italic
        fontSize: 11.6
        lineHeight: 1.58
        textAlign: left
        color: "#252422"
        backgroundColor: "#ffffff"
        borderWidth: 0
        borderLeftWidth: 0
        borderLeftColor: "#96928a"
        paddingTop: 6
        paddingBottom: 6
        paddingLeft: 18
        paddingRight: 8
        marginTop: 9
        marginBottom: 10
    extract:
      style:
        fontFamily: Caladea
        fontStyle: italic
        fontSize: 11.2
        lineHeight: 1.5
        textAlign: left
        color: "#2a2a2a"
        backgroundColor: "#ffffff"
        borderWidth: 0
        borderLeftWidth: 0
        borderLeftColor: "#8d8a84"
        paddingTop: 6
        paddingBottom: 6
        paddingLeft: 14
        paddingRight: 8
        marginTop: 8
        marginBottom: 10
    epigraph:
      style:
        fontFamily: Caladea
        fontStyle: italic
        fontSize: 11
        lineHeight: 1.5
        textAlign: center
        color: "#2f2c28"
        backgroundColor: "#ffffff"
        borderWidth: 0
        paddingTop: 5
        paddingBottom: 5
        paddingLeft: 20
        paddingRight: 20
        marginTop: 10
        marginBottom: 10
    letter:
      style:
        fontFamily: Caladea
        fontStyle: normal
        fontSize: 11.2
        lineHeight: 1.5
        textAlign: left
        color: "#252525"
        backgroundColor: "#ffffff"
        borderWidth: 0
        borderColor: "#cfcbc2"
        paddingTop: 7
        paddingBottom: 7
        paddingLeft: 10
        paddingRight: 10
        marginTop: 8
        marginBottom: 10
    marginalia:
      style:
        fontFamily: Caladea
        fontStyle: italic
        fontSize: 10.6
        lineHeight: 1.45
        textAlign: left
        color: "#3a3732"
        backgroundColor: "#ffffff"
        borderWidth: 0
        borderLeftWidth: 0
        borderLeftColor: "#b1a795"
        paddingTop: 5
        paddingBottom: 5
        paddingLeft: 10
        paddingRight: 6
        marginTop: 7
        marginBottom: 8

styles:
  d2f_paragraph:
    textAlign: left
    marginBottom: 8.6
    hyphenation: off
    justifyEngine: legacy
  d2f_heading_1:
    fontSize: 20.8
    marginTop: 18
    marginBottom: 9
    hyphenation: off
    textAlign: left
  d2f_heading_2:
    fontSize: 16.2
    marginTop: 14
    marginBottom: 7
    hyphenation: off
    textAlign: left
  d2f_heading_3:
    fontSize: 13.9
    marginTop: 14
    marginBottom: 6
    hyphenation: off
    textAlign: left
  d2f_inline_code:
    fontFamily: Caladea
    fontStyle: italic
    fontSize: 11
    backgroundColor: "#ffffff"
  d2f_blockquote:
    textAlign: left
    fontStyle: italic
    fontSize: 10.4
    lineHeight: 1.45
    color: "#2b2a28"
    paddingLeft: 18
    paddingRight: 8
    borderLeftWidth: 0
    marginTop: 8
    marginBottom: 9
  d2f_blockquote_attribution:
    textAlign: right
    fontStyle: normal
    fontSize: 9.8
    color: "#47443f"
    marginTop: 2
    marginBottom: 7
  d2f_references_heading:
    hyphenation: off
    textAlign: left
    fontSize: 12.4
    marginTop: 12
    marginBottom: 5
  d2f_references_item:
    textAlign: left
    hyphenation: off
    lineHeight: 1.3
    fontSize: 9.8
    marginBottom: 3
    paddingLeft: 12
    textIndent: -12
  d2f_list_item_ordered_0:
    textAlign: left
    hyphenation: off
    justifyEngine: legacy
    marginBottom: 3.6
  d2f_list_item_ordered_1:
    textAlign: left
    hyphenation: off
    justifyEngine: legacy
    marginBottom: 3.2
  d2f_list_item_unordered_0:
    textAlign: left
    hyphenation: off
    justifyEngine: legacy
    marginBottom: 3.6
  d2f_list_item_unordered_1:
    textAlign: left
    hyphenation: off
    justifyEngine: legacy
    marginBottom: 3.2
  d2f_definition_term:
    fontStyle: italic
    fontWeight: 700
    marginTop: 5.5
    marginBottom: 1.2
  d2f_definition_desc:
    paddingLeft: 14
    marginTop: 0
    marginBottom: 5.4
  table-cell:
    paddingTop: 4
    paddingBottom: 4
    paddingLeft: 5
    paddingRight: 5
    borderWidth: 0.6
    borderColor: "#111111"
