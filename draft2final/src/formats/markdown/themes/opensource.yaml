layout:
  fontFamily: Carlito
  fontSize: 11.1
  lineHeight: 1.68
  pageSize: A4
  margins:
    top: 84
    right: 76
    bottom: 86
    left: 76
  hyphenation: soft
  justifyEngine: advanced
  justifyStrategy: auto
  showPageNumbers: false
  pageNumberFormat: "{n}"
  pageNumberPosition: bottom
  pageNumberAlignment: center
  pageNumberOffset: 30
  pageNumberStartPage: 1
  pageNumberFontSize: 8.6
  pageNumberColor: "#8a94a6"
  pageNumberFont: Carlito

styles:
  heading-1:
    fontFamily: Caladea
    fontSize: 27
    lineHeight: 1.2
    color: "#101622"
    marginTop: 38
    marginBottom: 22
    hyphenation: "off"
    textAlign: center
    keepWithNext: true
  subheading:
    fontFamily: Carlito
    fontSize: 10.2
    lineHeight: 1.36
    color: "#6f7785"
    letterSpacing: 0.9
    textAlign: center
    marginTop: -8
    marginBottom: 28
    keepWithNext: true
  heading-2:
    fontFamily: Carlito
    fontSize: 12
    fontWeight: 700
    color: "#2f3d52"
    marginTop: 30
    marginBottom: 12
    hyphenation: "off"
    textAlign: left
  heading-3:
    fontFamily: Carlito
    fontSize: 10.8
    fontWeight: 700
    color: "#506079"
    marginTop: 20
    marginBottom: 8
    hyphenation: "off"
    textAlign: left
  paragraph:
    textAlign: left
    hyphenation: soft
    lineHeight: 1.7
    marginBottom: 11.8
  references-heading:
    fontFamily: Carlito
  references-item:
    fontFamily: Carlito
  inline-code:
    fontFamily: Cousine
    fontSize: 9.6
    color: "#1f3550"
    backgroundColor: "#f0f3f8"
    borderRadius: 2
  code-block:
    fontFamily: Cousine
    fontSize: 9.7
    lineHeight: 1.36
    allowLineSplit: true
    overflowPolicy: clip
    color: "#1f2937"
    backgroundColor: "#f8fafc"
    borderWidth: 0.8
    borderColor: "#d7deea"
    borderRadius: 4
    paddingTop: 8
    paddingBottom: 8
    paddingLeft: 11
    paddingRight: 11
    marginTop: 10
    marginBottom: 14
  blockquote:
    textAlign: left
    hyphenation: "off"
    fontFamily: Caladea
    fontStyle: italic
    fontSize: 12
    lineHeight: 1.56
    color: "#2a3344"
    paddingLeft: 18
    paddingRight: 18
    borderLeftWidth: 0
    backgroundColor: "#ffffff"
    marginTop: 14
    marginBottom: 16
  blockquote-attribution:
    textAlign: right
    fontStyle: normal
    fontFamily: Carlito
    fontSize: 9.8
    color: "#677185"
    marginTop: 3
    marginBottom: 10
  thematic-break:
    width: 132
    marginLeft: 0
    borderTopWidth: 0.45
    borderTopColor: "#aeb9ca"
    opacity: 0.9
    marginTop: 28
    marginBottom: 24
  definition-term:
    fontWeight: 700
    color: "#2f3d52"
    marginTop: 8
    marginBottom: 2
  definition-desc:
    paddingLeft: 14
    marginBottom: 8
  table-cell:
    fontFamily: Carlito
    paddingTop: 5
    paddingBottom: 5
    paddingLeft: 6
    paddingRight: 6
    borderWidth: 0.6
    borderColor: "#bfc9d8"
